<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑛の毎日ドリル</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.header h1{font-size:1.15rem;font-weight:700}.header .date{font-size:.8rem;opacity:.9}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:.82rem;font-weight:600;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.tab:hover{color:#3b82f6;background:#f8fafc}.tab.active{color:#2563eb;border-bottom-color:#2563eb;background:#eff6ff}
.container{max-width:860px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:24px;margin:12px 0;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.motiv-banner{background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:16px;padding:20px 24px;margin:12px 0;color:#78350f;position:relative;overflow:hidden}
.motiv-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,.15);border-radius:50%}
.motiv-banner .motiv-name{font-size:1.05rem;font-weight:800;margin-bottom:4px;position:relative;z-index:1}
.motiv-banner .motiv-text{font-size:.92rem;line-height:1.7;font-weight:600;position:relative;z-index:1}
.motiv-banner .motiv-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:2.5rem;opacity:.6;z-index:1}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-outline{background:#fff;border:2px solid #e2e8f0;color:#475569}.btn-outline:hover{border-color:#818cf8;color:#4f46e5}
.subject-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:20px 0}
.subject-card{padding:22px 14px;border-radius:16px;text-align:center;cursor:pointer;transition:.2s;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.subject-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.subject-card.math{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.subject-card.japanese{background:linear-gradient(135deg,#f59e0b,#b45309)}
.subject-card.english{background:linear-gradient(135deg,#10b981,#047857)}
.subject-card .icon{font-size:2rem;margin-bottom:6px}.subject-card .label{font-size:1.1rem;font-weight:700}
.subject-card .sub{font-size:.75rem;opacity:.85;margin-top:3px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.mode-card{padding:18px 14px;border-radius:14px;text-align:center;cursor:pointer;transition:.2s;border:2px solid #e2e8f0;background:#fff}
.mode-card:hover{border-color:#818cf8;background:#f5f3ff}.mode-card.disabled{opacity:.4;cursor:not-allowed}
.mode-card .m-icon{font-size:1.5rem;margin-bottom:4px}.mode-card .m-label{font-size:.95rem;font-weight:700;color:#334155}
.mode-card .m-sub{font-size:.73rem;color:#64748b;margin-top:3px}
.cat-filters{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.cat-chip{padding:5px 12px;border-radius:16px;border:1.5px solid #e2e8f0;background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;transition:.2s;color:#64748b}
.cat-chip:hover{border-color:#818cf8;color:#4f46e5}.cat-chip.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.progress-bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.math{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.progress-fill.japanese{background:linear-gradient(90deg,#f59e0b,#d97706)}
.progress-fill.english{background:linear-gradient(90deg,#10b981,#059669)}
.progress-text{text-align:center;font-size:.8rem;color:#64748b;margin-top:4px}
.q-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid #cbd5e1;background:#fff;font-size:.75rem;font-weight:700;color:#64748b;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.dot:hover{border-color:#818cf8}.dot.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.dot.correct{background:#10b981;color:#fff;border-color:#10b981}.dot.wrong{background:#ef4444;color:#fff;border-color:#ef4444}
.dot.revealed{background:#fbbf24;color:#fff;border-color:#fbbf24}
.q-label{display:inline-block;padding:3px 12px;border-radius:16px;font-size:.75rem;font-weight:700;color:#fff;margin-bottom:8px}
.q-label.math{background:#3b82f6}.q-label.japanese{background:#d97706}.q-label.english{background:#059669}
.cat-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600;background:#e2e8f0;color:#475569;margin-left:6px}
.grade-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;background:#ddd6fe;color:#5b21b6;margin-left:4px}
.q-number{font-size:1.3rem;font-weight:800;margin-bottom:12px;color:#334155}
.q-text{font-size:1.05rem;line-height:2;white-space:pre-wrap;margin-bottom:8px}
.q-hint{font-size:.85rem;color:#64748b;margin-top:10px;padding:8px 12px;background:#f8fafc;border-radius:8px;border-left:3px solid #cbd5e1}
.answer-section{margin-top:20px;padding-top:16px;border-top:2px dashed #e2e8f0}
.answer-toggle{display:block;width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;background:#f8fafc;color:#475569;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.answer-toggle:hover{background:#eef2ff;border-color:#818cf8;color:#4f46e5}
.answer-box{background:#ecfdf5;border-radius:10px;padding:14px;margin:12px 0}
.answer-box .alabel{font-size:.75rem;font-weight:700;color:#059669;margin-bottom:2px}
.answer-box .avalue{font-size:1.15rem;font-weight:800;color:#065f46;white-space:pre-wrap}
.explanation-box{background:#eff6ff;border-radius:10px;padding:14px;border-left:4px solid #3b82f6;margin:12px 0}
.explanation-box .elabel{font-size:.75rem;font-weight:700;color:#2563eb;margin-bottom:6px}
.explanation-box .etext{font-size:.9rem;line-height:1.85;color:#1e3a5f;white-space:pre-wrap}
.score-buttons{display:flex;gap:12px;margin-top:14px;justify-content:center}
.score-btn{flex:1;max-width:170px;padding:12px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;border:3px solid transparent;text-align:center}
.score-btn.correct-btn{background:#ecfdf5;color:#059669;border-color:#6ee7b7}.score-btn.correct-btn.selected{background:#059669;color:#fff}
.score-btn.wrong-btn{background:#fef2f2;color:#dc2626;border-color:#fca5a5}.score-btn.wrong-btn.selected{background:#dc2626;color:#fff}
.nav-buttons{display:flex;justify-content:space-between;align-items:center;margin:16px 0;gap:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0}
.stat-card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-card .s-value{font-size:1.7rem;font-weight:800}.stat-card .s-label{font-size:.72rem;color:#64748b;margin-top:2px}
.stat-card.blue .s-value{color:#2563eb}.stat-card.green .s-value{color:#059669}
.stat-card.red .s-value{color:#dc2626}.stat-card.purple .s-value{color:#7c3aed}
.cat-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.83rem}
.cat-table th{background:#f1f5f9;padding:7px 8px;text-align:left;font-weight:700;color:#475569;border-bottom:2px solid #e2e8f0}
.cat-table td{padding:7px 8px;border-bottom:1px solid #f1f5f9}.cat-table tr:hover{background:#f8fafc}
.bar-cell{position:relative;min-width:80px}.bar-bg{height:16px;background:#e2e8f0;border-radius:8px;overflow:hidden}
.bar-inner{height:100%;border-radius:8px;transition:width .3s}.bar-inner.green{background:#10b981}.bar-inner.yellow{background:#f59e0b}.bar-inner.red{background:#ef4444}
.bar-pct{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:.7rem;font-weight:700;color:#334155}
.weak-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:700;background:#fef2f2;color:#dc2626;margin-left:4px}
.welcome{text-align:center;padding:20px 0}.welcome h2{font-size:1.3rem;margin-bottom:4px;color:#1e293b}
.welcome p{color:#64748b;font-size:.92rem;margin-bottom:14px}
.section-title{font-size:1rem;font-weight:700;color:#334155;margin:18px 0 6px;border-left:4px solid #3b82f6;padding-left:10px}
.daily-badge{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:3px 10px;border-radius:10px;font-size:.72rem;font-weight:700;margin-left:6px}
.history-day{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.85rem}
.history-day .hd-date{font-weight:700;min-width:90px;color:#475569}.history-day .hd-bar{flex:1}
.streak-display{text-align:center;margin:10px 0}.streak-num{font-size:2.5rem;font-weight:800;color:#f59e0b}
.streak-label{font-size:.8rem;color:#64748b}
.q-fig{margin:12px 0;text-align:center;padding:8px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;overflow-x:auto}
.q-fig svg{max-width:100%;height:auto}
.q-fig-caption{font-size:.75rem;color:#64748b;margin-top:4px}
.ef-fig{margin:10px 0;text-align:center;padding:8px;background:#f0f9ff;border-radius:10px}
.ef-fig svg{max-width:100%;height:auto}
.kanji-block{margin-top:14px;display:flex;flex-direction:column;gap:14px}
.kanji-card{background:#fffbeb;border:2px solid #fcd34d;border-radius:14px;padding:14px;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.kanji-svg-wrap{flex-shrink:0;width:130px;height:130px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:6px;position:relative}
.kanji-svg-wrap svg{width:100%;height:100%}
.kanji-svg-wrap svg path{stroke:#1e293b;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.kanji-svg-wrap svg g[id*="StrokeNumbers"] text{visibility:visible!important;fill:#dc2626!important;font-size:8px!important;font-weight:bold;font-family:sans-serif}
.kanji-svg-wrap .loading{color:#94a3b8;font-size:.7rem}
.kanji-info{flex:1;min-width:180px;font-size:.88rem;line-height:1.7}
.kanji-info .kmean{font-weight:700;color:#78350f;font-size:.95rem;margin-bottom:6px}
.kanji-info .krow{margin:3px 0;color:#334155}
.kanji-info .krow b{display:inline-block;min-width:28px;color:#b45309;font-size:.78rem;background:#fef3c7;padding:1px 6px;border-radius:6px;margin-right:6px}
.kanji-info .kwords{margin-top:6px;padding-top:6px;border-top:1px dashed #fcd34d}
.kanji-info .kword{display:inline-block;background:#fff;border:1px solid #fcd34d;padding:2px 8px;border-radius:6px;margin:3px 4px 0 0;font-size:.82rem;color:#78350f}
.kanji-info .kword small{color:#a16207;font-weight:600;margin-left:3px}
@media(max-width:600px){.container{padding:10px}.card{padding:16px}.subject-grid{grid-template-columns:1fr}.mode-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.kanji-svg-wrap{width:110px;height:110px}}
</style>
</head>
<body>
<div class="header"><h1>瑛の毎日ドリル</h1><div class="date" id="todayDate"></div></div>
<div class="tab-bar" id="tabBar"></div>
<div class="container" id="app"></div>
<script>
// ============ 応援メッセージ ============
const motivMessages=[
{text:"大谷翔平も毎日の素振りから始まった。瑛の毎日のドリルも、未来のホームランにつながってるよ！",icon:"⚾"},
{text:"マイクラで最初にダイヤを見つけた時みたいに、勉強も掘り続ければダイヤみたいな発見がある！",icon:"💎"},
{text:"プロスピで打率を上げるコツは繰り返し練習。勉強も同じ。今日も1打席1打席、全力で！",icon:"🏟️"},
{text:"英検2級を4年生でクリアした瑛なら、準1級だって絶対いける。今日の1問が合格への1歩！",icon:"🏆"},
{text:"マイクラのエンダードラゴンも準備と戦略があれば倒せる。受験も同じだ！",icon:"🐉"},
{text:"イチローは「小さな積み重ねがとんでもない所へ行く唯一の道」と言った。今日も積み重ねよう！",icon:"🌟"},
{text:"プロスピでSランク選手を育てるにはコツコツが大事。瑛もSランクへ一歩ずつ！",icon:"📈"},
{text:"マイクラで自分だけの世界を作れるように、勉強で自分だけの未来を作ろう！",icon:"🧱"},
{text:"三振しても次の打席がある。間違えても大丈夫、弱点克服ドリルで打ち返そう！",icon:"💪"},
{text:"英語で世界中の人と話せるってすごいこと。準1級の先にもっと広い世界が待ってる！",icon:"🌍"},
{text:"大谷は二刀流。瑛は算数・国語・英語の三刀流だ！今日も三刀流の力を磨こう！",icon:"⚡"},
{text:"マイクラのレッドストーン回路みたいに、算数も論理的に考える力がカギ。楽しんでいこう！",icon:"🔧"},
{text:"WBC決勝のトラウトとの対決を思い出せ。本番で結果を出すには日々の準備がすべて！",icon:"🇯🇵"},
{text:"エンチャントテーブルで最強装備を作るみたいに、毎日の勉強で知識をエンチャントしよう！",icon:"✨"},
{text:"Keep going, Ei! Every question you solve today brings you closer to your dream!",icon:"💫"},
{text:"つるかめ算も旅人算も、コツをつかめばマイクラの建築みたいに楽しくなる！",icon:"⛏️"},
{text:"プロスピの逆転サヨナラみたいに、受験本番で力を出すには今日の練習が大事！",icon:"🎯"},
{text:"Yesterday is history, tomorrow is a mystery, today is a gift! 今日も最高の1日にしよう！",icon:"🎁"},
{text:"ダルビッシュも「練習は裏切らない」と言った。今日の1問は絶対ムダにならない！",icon:"⭐"},
{text:"Baseball, Minecraft, English — 瑛は何でもチャレンジする最強プレイヤーだ！",icon:"🏅"},
];

// ============ 大規模問題バンク ============
const questions={
math:[
// 4年 計算
{id:"m01",g:4,cat:"計算",q:"248 + 376 + 152 を工夫して計算しなさい。",h:"キリのいい組み合わせを探そう。",a:"776",ex:"248+152=400, 400+376=776\n【ポイント】交換法則でキリのいい数を先に作る。"},
{id:"m02",g:4,cat:"計算",q:"1000 − 387 を計算しなさい。",h:"999−387+1 で考える方法もあるよ。",a:"613",ex:"999−387=612, 612+1=613"},
{id:"m03",g:4,cat:"計算",q:"25 × 36 を工夫して計算しなさい。",h:"25×4=100 を利用しよう。",a:"900",ex:"25×4×9=100×9=900"},
{id:"m04",g:4,cat:"計算",q:"72÷8+15×3 を計算しなさい。",h:"×÷を先に計算。",a:"54",ex:"9+45=54。四則混合は×÷→+−の順。"},
{id:"m05",g:4,cat:"計算",q:"3.5+2.78 を計算しなさい。",h:"小数点をそろえて筆算。",a:"6.28",ex:"3.50+2.78=6.28"},
// 4年 図形・角度
{id:"m06",g:4,cat:"図形",q:"三角形の2つの角が45°と70°。残りは？",h:"内角の和=180°",a:"65°",ex:"180−45−70=65°"},
{id:"m07",g:4,cat:"図形",q:"平行四辺形の1つの角が65°。隣の角は？",h:"隣り合う角の和=180°",a:"115°",ex:"180−65=115°"},
{id:"m08",g:4,cat:"図形",q:"たて7cm、横12cmの長方形の面積は？",h:"たて×横",a:"84 cm²",ex:"7×12=84 cm²"},
{id:"m09",g:4,cat:"図形",q:"1辺が9cmの正方形の面積は？",h:"正方形=1辺×1辺",a:"81 cm²",ex:"9×9=81 cm²"},
// 4年 わり算・小数
{id:"m10",g:4,cat:"計算",q:"324÷18 を計算しなさい。",h:"18=2×9で2段階に分ける。",a:"18",ex:"324÷2÷9=162÷9=18"},
{id:"m11",g:4,cat:"小数",q:"0.3×7 = ?",h:"整数で計算→小数点を戻す。",a:"2.1",ex:"3×7=21→2.1"},
{id:"m12",g:4,cat:"がい数",q:"2847を四捨五入して百の位までのがい数に。",h:"十の位を見る。",a:"2800",ex:"十の位4→切り捨て→2800"},
// 5年 分数・割合
{id:"m20",g:5,cat:"計算",q:"3.14×25+3.14×75 を工夫して計算。",h:"共通の3.14をくくり出す。",a:"314",ex:"3.14×(25+75)=3.14×100=314　分配法則。"},
{id:"m21",g:5,cat:"計算",q:"1/2 + 2/3 + 1/6 を計算しなさい。",h:"最小公倍数で通分。",a:"4/3（1と1/3）",ex:"3/6+4/6+1/6=8/6=4/3"},
{id:"m22",g:5,cat:"計算",q:"3/4 × 2/5 を計算しなさい。",h:"分子同士・分母同士をかける。",a:"3/10",ex:"6/20=3/10。先に約分すると楽。"},
{id:"m23",g:5,cat:"計算",q:"5/6 − 1/4 を計算しなさい。",h:"通分してからひき算。",a:"7/12",ex:"10/12−3/12=7/12"},
{id:"m24",g:5,cat:"割合",q:"定価の2割引きで1600円。定価は？",h:"2割引き=0.8倍",a:"2000円",ex:"1600÷0.8=2000円"},
{id:"m25",g:5,cat:"割合",q:"500人の56%は何人？",h:"56%=0.56",a:"280人",ex:"500×0.56=280"},
// 5年 速さ
{id:"m26",g:5,cat:"速さ",q:"1.2kmを毎分80mで歩くと何分？",h:"1.2km=1200m",a:"15分",ex:"1200÷80=15分"},
{id:"m27",g:5,cat:"速さ",q:"時速60kmで2時間30分走ると何km？",h:"30分=0.5時間",a:"150km",ex:"60×2.5=150km"},
// 5年 図形・体積
{id:"m28",g:5,cat:"図形",q:"半径5cmの円の面積は？（π=3.14）",h:"半径×半径×π",a:"78.5 cm²",ex:"5×5×3.14=78.5 cm²"},
{id:"m29",g:5,cat:"図形",q:"底辺10cm、高さ6cmの三角形の面積は？",h:"÷2を忘れずに。",a:"30 cm²",ex:"10×6÷2=30 cm²"},
{id:"m30",g:5,cat:"図形",q:"たて4cm、横5cm、高さ6cmの直方体の体積は？",h:"たて×横×高さ",a:"120 cm³",ex:"4×5×6=120 cm³"},
// 5年 場合の数・比・規則性
{id:"m31",g:5,cat:"場合の数",q:"1,2,3,4から2枚で2けたの整数。何通り？",h:"十の位4通り×一の位3通り",a:"12通り",ex:"4×3=12通り（順列）"},
{id:"m32",g:5,cat:"比",q:"兄:弟=5:3。兄800円のとき弟は？",h:"比の1あたりを求める。",a:"480円",ex:"800÷5=160, 160×3=480円"},
{id:"m33",g:5,cat:"規則性",q:"1,4,9,16,25,...の10番目は？",h:"N番目=N×N",a:"100",ex:"10×10=100（平方数）"},
// ★★ 特殊算 ★★
{id:"m40",g:4,cat:"和差算",q:"2つの数の和が52で、差が8です。大きい方の数はいくつ？",h:"(和+差)÷2 = 大きい方",a:"30",ex:"（52+8）÷2=30\n小さい方 =（52−8）÷2=22\n検算: 30+22=52, 30−22=8 ✓\n\n【和差算の公式】\n大 =（和+差）÷2\n小 =（和−差）÷2\n線分図を描いて考えると理解しやすいよ。"},
{id:"m41",g:4,cat:"和差算",q:"姉と妹の持っているお金の合計は3200円。姉は妹より600円多い。妹はいくら持っている？",h:"線分図を描いて考えよう。",a:"1300円",ex:"妹 =（3200−600）÷2=1300円\n姉 = 1300+600=1900円\n検算: 1300+1900=3200 ✓"},
{id:"m42",g:5,cat:"つるかめ算",q:"ツルとカメが合わせて10匹います。足の数の合計が28本のとき、ツルは何羽？",h:"全部カメだったら足は何本？そこからツルに変えていくと…",a:"6羽",ex:"全部カメと仮定：10×4=40本\n実際との差：40−28=12本\n1匹をカメ→ツルに変えると：4−2=2本減る\nツルの数：12÷2=6羽\nカメ：10−6=4匹\n検算：6×2+4×4=12+16=28 ✓\n\n【つるかめ算の解き方】\n①全部片方と仮定 ②差を出す ③1匹入れ替えた時の差で割る"},
{id:"m43",g:5,cat:"つるかめ算",q:"50円切手と80円切手を合わせて15枚買い、合計900円払いました。50円切手は何枚？",h:"全部50円だったら…？",a:"10枚",ex:"全部50円：15×50=750円\n差：900−750=150円\n1枚80円に変えると：80−50=30円増\n80円切手：150÷30=5枚\n50円切手：15−5=10枚\n検算：10×50+5×80=500+400=900 ✓"},
{id:"m44",g:4,cat:"植木算",q:"120mの道の片側に、端から端まで6mおきに木を植えます。木は何本必要？",h:"間の数+1 が木の数だよ。",a:"21本",ex:"間の数：120÷6=20\n木の数：20+1=21本\n\n【植木算の3パターン】\n①両端に植える：間の数+1\n②片端だけ：間の数\n③円形：間の数＝木の数"},
{id:"m45",g:4,cat:"植木算",q:"池のまわりの長さが200mです。5mおきに木を植えると何本必要？",h:"池のまわり（円形）の植木算。",a:"40本",ex:"200÷5=40本\n円形なので「間の数＝木の数」"},
{id:"m46",g:5,cat:"旅人算",q:"太郎は毎分60m、次郎は毎分40mで同じ方向に同時に出発。太郎が次郎に追いつくには、最初に200m差があったとき何分かかる？",h:"1分あたり差がどれだけ縮まる？",a:"10分",ex:"毎分の差：60−40=20m\n200÷20=10分\n\n【旅人算】\n追いかけ：距離÷速さの差\n出会い：距離÷速さの和"},
{id:"m47",g:5,cat:"旅人算",q:"AとBが1800m離れた地点から向かい合って同時に出発。Aは毎分70m、Bは毎分50m。何分後に出会う？",h:"1分あたり何m近づく？",a:"15分",ex:"毎分の和：70+50=120m\n1800÷120=15分\n\n出会いの旅人算は「距離÷速さの和」"},
{id:"m48",g:5,cat:"仕事算",q:"Aは12日、Bは6日で終わる仕事。2人で一緒にやると何日？",h:"1日の仕事量をそれぞれ求めよう。",a:"4日",ex:"Aの1日: 1/12、Bの1日: 1/6\n合計: 1/12+1/6=1/12+2/12=3/12=1/4\n全体÷(1/4)=4日"},
{id:"m49",g:5,cat:"濃度算",q:"10%の食塩水200gに食塩を何g加えると20%になる？",h:"食塩水全体の重さも変わるよ。",a:"25g",ex:"最初の食塩: 200×0.1=20g\n加えた後: (20+x)÷(200+x)=0.2\n20+x=0.2(200+x)=40+0.2x\n0.8x=20, x=25g\n\n【濃度算のコツ】\n濃度(%)=食塩÷食塩水全体×100\n食塩水全体=水+食塩 を忘れずに。"},
{id:"m50",g:5,cat:"通過算",q:"長さ120mの列車が時速72kmで走っています。長さ280mの鉄橋を渡り始めてから渡り終わるまで何秒？",h:"列車が進む距離=鉄橋+列車の長さ",a:"20秒",ex:"進む距離: 280+120=400m\n時速72km=秒速20m（72000÷3600）\n400÷20=20秒\n\n【通過算のポイント】\n鉄橋を渡る: 距離=鉄橋+列車\nすれ違い: 距離=列車A+列車B\n時速→秒速: ÷3600×1000（÷3.6）"},
{id:"m51",g:5,cat:"差集め算",q:"生徒にあめを配ります。1人5個ずつだと20個余り、1人7個ずつだと4個足りない。生徒は何人？",h:"配り方を変えると、全体で何個の差がある？",a:"12人",ex:"差: 20+4=24個（余りと不足は足す）\n1人あたりの差: 7−5=2個\n生徒: 24÷2=12人\n検算: 12×5=60, 60+20=80(あめ), 12×7=84, 84−80=4(不足) ✓"},
{id:"m52",g:5,cat:"消去算",q:"ノート3冊とペン5本で1050円。ノート3冊とペン2本で750円。ペン1本は？",h:"ノートの数が同じ！引き算で消せる。",a:"100円",ex:"①−②: ペン3本=300円\nペン1本=100円"},
{id:"m53",g:5,cat:"文章題",q:"兄弟で4500円を分けます。兄は弟の2倍より300円多くもらいます。弟はいくら？",h:"弟を□円として式を作ろう。",a:"1400円",ex:"弟=□, 兄=2×□+300\n□+(2×□+300)=4500\n3×□=4200\n□=1400円\n兄=2×1400+300=3100円"},
// ★★ 5年前半：小数のかけ算・わり算 ★★
{id:"m60",g:5,cat:"小数",q:"2.4×3.6を計算しましょう。",h:"小数第1位同士のかけ算。整数として計算→小数点を戻す。",a:"8.64",ex:"24×36=864。小数第1位×2個=小数第2位。864→8.64"},
{id:"m61",g:5,cat:"小数",q:"0.25×4.8を計算しましょう。",h:"25×48をまず計算。",a:"1.2",ex:"25×48=1200。小数第2位+第1位=第3位。1200→1.200→1.2"},
{id:"m62",g:5,cat:"小数",q:"3.5×2.4を計算しましょう。",h:"35×24を先に計算。",a:"8.4",ex:"35×24=840。小数第1位×2=第2位。840→8.40→8.4"},
{id:"m63",g:5,cat:"小数",q:"1.6×0.75を計算しましょう。",h:"0.75=3/4。小数点のけた数に注意。",a:"1.2",ex:"16×75=1200。小数第1位+第2位=第3位。1200→1.200→1.2"},
{id:"m64",g:5,cat:"小数",q:"0.12×3.5を計算しましょう。",h:"12×35を計算してから小数点を付ける。",a:"0.42",ex:"12×35=420。第2位+第1位=第3位。420→0.420→0.42"},
{id:"m65",g:5,cat:"小数",q:"7.2÷0.6を計算しましょう。",h:"割る数を整数にするため、両方10倍。",a:"12",ex:"7.2÷0.6=72÷6=12。割る数を整数にしてから計算。"},
{id:"m66",g:5,cat:"小数",q:"8.4÷1.2を計算しましょう。",h:"両方10倍して整数にする。",a:"7",ex:"84÷12=7。検算: 7×1.2=8.4 ✓"},
{id:"m67",g:5,cat:"小数",q:"9.6÷2.4を計算しましょう。",h:"10倍して96÷24。",a:"4",ex:"96÷24=4"},
{id:"m68",g:5,cat:"小数",q:"3.75÷1.5を計算しましょう。",h:"10倍すると37.5÷15。",a:"2.5",ex:"37.5÷15=2.5。小数÷小数はまず割る数を整数に。"},
// ★★ 5年前半：整数の性質（偶数奇数・倍数約数） ★★
{id:"m70",g:5,cat:"整数の性質",q:"6と8の最小公倍数を求めましょう。",h:"6の倍数：6,12,18,24…。8の倍数：8,16,24…。",a:"24",ex:"6の倍数と8の倍数で共通な最小の数。6×4=24, 8×3=24。"},
{id:"m71",g:5,cat:"整数の性質",q:"24の約数をすべて答えましょう。",h:"24を割り切れる数を1から順に調べる。",a:"1,2,3,4,6,8,12,24",ex:"24=1×24=2×12=3×8=4×6。ペアで見つけると漏れにくい。"},
{id:"m72",g:5,cat:"整数の性質",q:"12と18の最大公約数を求めましょう。",h:"12の約数と18の約数を書き出して共通のものを探す。",a:"6",ex:"12の約数: 1,2,3,4,6,12。18の約数: 1,2,3,6,9,18。共通で最大は6。"},
{id:"m73",g:5,cat:"整数の性質",q:"36と60の最小公倍数と最大公約数を求めましょう。",h:"最大公約数で両方割って考える。",a:"最大公約数: 12、最小公倍数: 180",ex:"36=12×3, 60=12×5。最大公約数=12。最小公倍数=12×3×5=180。"},
{id:"m74",g:5,cat:"整数の性質",q:"1から30までの偶数は何個？",h:"2で割り切れる数が偶数。",a:"15個",ex:"2,4,6,...,30。30÷2=15個。"},
{id:"m75",g:5,cat:"整数の性質",q:"3と5の公倍数で100以下のものをすべて答えましょう。",h:"3と5の最小公倍数は15。その倍数を列挙。",a:"15,30,45,60,75,90",ex:"最小公倍数15の倍数: 15,30,45,60,75,90（105は100超）"},
// ★★ 5年前半：平均 ★★
{id:"m76",g:5,cat:"平均",q:"65,73,58,84の4つの数の平均は？",h:"全部足して÷4。",a:"70",ex:"(65+73+58+84)÷4=280÷4=70"},
{id:"m77",g:5,cat:"平均",q:"5日間の気温の平均が24℃。合計は何℃？",h:"平均×個数＝合計（逆算）。",a:"120℃",ex:"24×5=120℃。平均から合計を逆算する典型題。"},
{id:"m78",g:5,cat:"平均",q:"3つの数の平均が20。4つ目を加えると平均22に。4つ目は？",h:"合計の差が4つ目の数。",a:"28",ex:"3つの合計=20×3=60。4つの合計=22×4=88。4つ目=88-60=28。"},
// ★★ 5年前半：単位量あたりの大きさ ★★
{id:"m79",g:5,cat:"単位量",q:"面積25㎡の部屋に75人。1㎡あたり何人？",h:"人数÷面積。",a:"3人",ex:"75÷25=3人/㎡。単位量あたり=全体÷面積"},
{id:"m80",g:5,cat:"単位量",q:"A市は面積40k㎡に人口32万人。B市は面積50k㎡に人口35万人。どちらが混んでいる？",h:"1k㎡あたりの人口（人口密度）を比較。",a:"A市（人口密度8000人/k㎡）",ex:"A: 320000÷40=8000人/k㎡。B: 350000÷50=7000人/k㎡。Aの方が密度が高い。"},
{id:"m81",g:5,cat:"単位量",q:"8Lのガソリンで120km走る車。1Lあたり何km？",h:"距離÷ガソリン量。",a:"15km",ex:"120÷8=15km/L。燃費の計算も単位量あたりの考え方。"},
// ========== 図形：基本のきほん ==========
{id:"g01",g:4,cat:"図形",q:"三角形の内角の和は何度ですか？",h:"どんな三角形でも同じだよ。",a:"180°",fig:'<svg width="200" height="140" viewBox="0 0 200 140"><polygon points="100,10 20,130 180,130" fill="none" stroke="#2563eb" stroke-width="2.5"/><text x="95" y="38" font-size="13" fill="#dc2626" font-weight="bold">A</text><text x="4" y="128" font-size="13" fill="#dc2626" font-weight="bold">B</text><text x="180" y="128" font-size="13" fill="#dc2626" font-weight="bold">C</text><path d="M40,130 A20,20 0 0,1 28,115" fill="none" stroke="#f59e0b" stroke-width="2"/><path d="M160,130 A20,20 0 0,0 172,115" fill="none" stroke="#10b981" stroke-width="2"/><path d="M92,28 A20,20 0 0,0 108,28" fill="none" stroke="#8b5cf6" stroke-width="2"/></svg>',ex:"三角形の内角の和はかならず180°。\nどんな形の三角形でもこれは変わらない。\n\n【確認方法】三角形を切って3つの角を並べると一直線（180°）になる。",efig:'<svg width="260" height="80" viewBox="0 0 260 80"><rect x="10" y="50" width="240" height="2" fill="#64748b"/><path d="M80,52 L80,52 A40,40 0 0,1 50,30" fill="none" stroke="#f59e0b" stroke-width="3"/><path d="M110,52 L110,52 A40,40 0 0,1 140,30" fill="none" stroke="#10b981" stroke-width="3"/><path d="M150,52 L150,52 A40,40 0 0,0 170,35" fill="none" stroke="#8b5cf6" stroke-width="3"/><text x="55" y="25" font-size="12" fill="#f59e0b" font-weight="bold">B</text><text x="118" y="25" font-size="12" fill="#10b981" font-weight="bold">C</text><text x="165" y="25" font-size="12" fill="#8b5cf6" font-weight="bold">A</text><text x="190" y="45" font-size="12" fill="#64748b">= 180°（一直線）</text></svg>'},
{id:"g02",g:4,cat:"図形",q:"四角形の内角の和は何度ですか？",h:"対角線で三角形に分けて考えよう。",a:"360°",fig:'<svg width="200" height="150" viewBox="0 0 200 150"><polygon points="30,30 170,20 180,130 20,120" fill="none" stroke="#2563eb" stroke-width="2.5"/><line x1="30" y1="30" x2="180" y2="130" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/></svg>',ex:"四角形は対角線で2つの三角形に分けられる。\n三角形の内角の和 = 180°\n2つで 180° × 2 = 360°\n\n【発展】五角形 = 3つの三角形 = 540°\nn角形 = (n−2) × 180°"},
{id:"g03",g:4,cat:"図形",q:"二等辺三角形の底角が65°のとき、頂角は何度？",h:"二等辺三角形は2つの角が同じ。",a:"50°",fig:'<svg width="180" height="140" viewBox="0 0 180 140"><polygon points="90,10 20,130 160,130" fill="none" stroke="#2563eb" stroke-width="2.5"/><line x1="90" y1="10" x2="20" y2="130" stroke="#2563eb" stroke-width="2.5"/><line x1="90" y1="10" x2="160" y2="130" stroke="#2563eb" stroke-width="2.5"/><text x="30" y="125" font-size="12" fill="#dc2626" font-weight="bold">65°</text><text x="125" y="125" font-size="12" fill="#dc2626" font-weight="bold">65°</text><text x="82" y="35" font-size="12" fill="#2563eb" font-weight="bold">?°</text><line x1="70" y1="12" x2="70" y2="8" stroke="#10b981" stroke-width="1.5"/><line x1="65" y1="70" x2="55" y2="70" stroke="#10b981" stroke-width="6"/><line x1="115" y1="70" x2="125" y2="70" stroke="#10b981" stroke-width="6"/></svg>',ex:"二等辺三角形は2つの底角が等しい。\n底角 + 底角 + 頂角 = 180°\n65° + 65° + ?° = 180°\n?° = 180° − 130° = 50°"},
{id:"g04",g:4,cat:"図形",q:"正三角形の1つの角は何度？",h:"3つの辺が等しい → 3つの角も等しい。",a:"60°",fig:'<svg width="160" height="150" viewBox="0 0 160 150"><polygon points="80,10 15,130 145,130" fill="none" stroke="#2563eb" stroke-width="2.5"/><line x1="42" y1="70" x2="52" y2="70" stroke="#10b981" stroke-width="6"/><line x1="118" y1="70" x2="108" y2="70" stroke="#10b981" stroke-width="6"/><line x1="75" y1="132" x2="85" y2="132" stroke="#10b981" stroke-width="6"/></svg>',ex:"正三角形は3つの辺が同じ長さ → 3つの角も同じ。\n180° ÷ 3 = 60°\n\n正三角形の性質：\n・3辺が等しい\n・3角がすべて60°\n・3本の対称の軸がある"},
{id:"g05",g:4,cat:"図形",q:"三角形ABCで∠A=40°、∠B=75°のとき、∠Cは何度？",h:"三角形の内角の和 = 180°",a:"65°",fig:'<svg width="220" height="140" viewBox="0 0 220 140"><polygon points="50,15 10,130 200,130" fill="none" stroke="#2563eb" stroke-width="2.5"/><text x="40" y="12" font-size="12" fill="#dc2626" font-weight="bold">A(40°)</text><text x="0" y="128" font-size="12" fill="#dc2626" font-weight="bold">B(75°)</text><text x="185" y="128" font-size="12" fill="#2563eb" font-weight="bold">C(?°)</text></svg>',ex:"∠A + ∠B + ∠C = 180°\n40° + 75° + ∠C = 180°\n∠C = 180° − 115° = 65°\n\n三角形の内角の和はいつも180°！"},
// ========== 図形：外角 ==========
{id:"g06",g:5,cat:"図形",q:"三角形の1つの外角は、となり合わない2つの内角の和に等しい。∠A=50°、∠B=60°のとき、Cの外角は？",h:"外角 = となり合わない2つの内角の和",a:"110°",fig:'<svg width="260" height="150" viewBox="0 0 260 150"><polygon points="70,15 10,130 180,130" fill="none" stroke="#2563eb" stroke-width="2.5"/><line x1="180" y1="130" x2="250" y2="130" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/><text x="60" y="12" font-size="12" fill="#2563eb" font-weight="bold">A(50°)</text><text x="0" y="126" font-size="12" fill="#2563eb" font-weight="bold">B(60°)</text><text x="170" y="126" font-size="12" fill="#333" font-weight="bold">C</text><path d="M195,130 A20,20 0 0,0 185,115" fill="none" stroke="#dc2626" stroke-width="2.5"/><text x="200" y="120" font-size="12" fill="#dc2626" font-weight="bold">?°</text></svg>',ex:"三角形の外角の定理：\n外角 = となり合わない2つの内角の和\n\nCの外角 = ∠A + ∠B = 50° + 60° = 110°\n\n【なぜ？】∠C = 180°−50°−60° = 70°\n外角 = 180°−70° = 110°（一直線=180°）\nつまり 50°+60° = 110° ✓"},
{id:"g07",g:5,cat:"図形",q:"下の図で、直線ℓとmは平行です。∠x は何度？",h:"平行線では「同位角」が等しい。",a:"55°",fig:'<svg width="260" height="140" viewBox="0 0 260 140"><line x1="10" y1="30" x2="250" y2="30" stroke="#2563eb" stroke-width="2"/><line x1="10" y1="110" x2="250" y2="110" stroke="#2563eb" stroke-width="2"/><line x1="60" y1="0" x2="160" y2="140" stroke="#f59e0b" stroke-width="2"/><text x="12" y="25" font-size="12" fill="#2563eb" font-weight="bold">ℓ</text><text x="12" y="105" font-size="12" fill="#2563eb" font-weight="bold">m</text><text x="105" y="25" font-size="12" fill="#dc2626" font-weight="bold">55°</text><text x="130" y="105" font-size="12" fill="#10b981" font-weight="bold">x°</text></svg>',ex:"平行線と直線が交わるときの角度：\n\n① 同位角（同じ位置の角）→ 等しい\n② 錯角（互い違いの角）→ 等しい\n\nℓ//m のとき、同位角が等しいので\n∠x = 55°"},
{id:"g08",g:5,cat:"図形",q:"下の図で、直線ℓとmは平行です。∠x は何度？（錯角）",h:"平行線の「錯角」は等しい。Z型に注目。",a:"48°",fig:'<svg width="260" height="140" viewBox="0 0 260 140"><line x1="10" y1="30" x2="250" y2="30" stroke="#2563eb" stroke-width="2"/><line x1="10" y1="110" x2="250" y2="110" stroke="#2563eb" stroke-width="2"/><line x1="180" y1="0" x2="80" y2="140" stroke="#f59e0b" stroke-width="2"/><text x="12" y="25" font-size="12" fill="#2563eb" font-weight="bold">ℓ</text><text x="12" y="105" font-size="12" fill="#2563eb" font-weight="bold">m</text><text x="148" y="25" font-size="12" fill="#dc2626" font-weight="bold">48°</text><text x="90" y="128" font-size="12" fill="#10b981" font-weight="bold">x°</text></svg>',ex:"平行線の錯角（Z型・逆Z型の角）は等しい。\n\n∠x = 48°（錯角）\n\n【見分け方】\n同位角 = F型（同じ側の同じ位置）\n錯角 = Z型（反対側で互い違い）"},
// ========== 図形：面積の基本 ==========
{id:"g09",g:4,cat:"図形",q:"たて8cm、横12cmの長方形の面積を求めなさい。",h:"長方形の面積 = たて × 横",a:"96 cm²",fig:'<svg width="220" height="140" viewBox="0 0 220 140"><rect x="20" y="20" width="180" height="100" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><text x="100" y="135" font-size="13" fill="#1e293b" font-weight="bold" text-anchor="middle">12cm</text><text x="210" y="75" font-size="13" fill="#1e293b" font-weight="bold">8cm</text></svg>',ex:"長方形の面積 = たて × 横\n= 8 × 12 = 96 cm²\n\n【単位に注意】面積の単位は cm²（平方センチメートル）"},
{id:"g10",g:4,cat:"図形",q:"底辺12cm、高さ8cmの平行四辺形の面積は？",h:"平行四辺形の面積 = 底辺 × 高さ（ななめの辺ではない！）",a:"96 cm²",fig:'<svg width="240" height="140" viewBox="0 0 240 140"><polygon points="50,20 220,20 190,120 20,120" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><line x1="50" y1="20" x2="50" y2="120" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,4"/><text x="90" y="135" font-size="13" fill="#1e293b" font-weight="bold">12cm</text><text x="52" y="75" font-size="12" fill="#dc2626" font-weight="bold">8cm</text></svg>',ex:"平行四辺形の面積 = 底辺 × 高さ\n= 12 × 8 = 96 cm²\n\n【重要】高さは底辺に垂直な長さ！\nななめの辺の長さではないよ。\n\n平行四辺形を切って並べ替えると長方形になる → だから底辺×高さ。"},
{id:"g11",g:4,cat:"図形",q:"底辺10cm、高さ6cmの三角形の面積は？",h:"三角形 = 底辺 × 高さ ÷ 2",a:"30 cm²",fig:'<svg width="200" height="140" viewBox="0 0 200 140"><polygon points="20,120 180,120 100,20" fill="#dcfce7" stroke="#059669" stroke-width="2.5"/><line x1="100" y1="20" x2="100" y2="120" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,4"/><text x="85" y="135" font-size="13" fill="#1e293b" font-weight="bold">10cm</text><text x="102" y="75" font-size="12" fill="#dc2626" font-weight="bold">6cm</text></svg>',ex:"三角形の面積 = 底辺 × 高さ ÷ 2\n= 10 × 6 ÷ 2 = 30 cm²\n\n【なぜ÷2？】\n同じ三角形を2つ合わせると平行四辺形になる。\n三角形 = 平行四辺形の半分 → ÷ 2"},
{id:"g12",g:5,cat:"図形",q:"上底6cm、下底10cm、高さ5cmの台形の面積は？",h:"台形 = (上底 + 下底) × 高さ ÷ 2",a:"40 cm²",fig:'<svg width="220" height="130" viewBox="0 0 220 130"><polygon points="60,20 160,20 200,110 20,110" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/><line x1="60" y1="20" x2="60" y2="110" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,4"/><text x="90" y="15" font-size="12" fill="#1e293b" font-weight="bold">6cm</text><text x="90" y="125" font-size="12" fill="#1e293b" font-weight="bold">10cm</text><text x="62" y="70" font-size="12" fill="#dc2626" font-weight="bold">5cm</text></svg>',ex:"台形の面積 = (上底 + 下底) × 高さ ÷ 2\n= (6 + 10) × 5 ÷ 2\n= 16 × 5 ÷ 2 = 40 cm²\n\n【覚え方】同じ台形を上下ひっくり返して合わせると平行四辺形になる。\nその底辺 = 上底+下底、高さは同じ → ÷2"},
{id:"g13",g:5,cat:"図形",q:"対角線が8cmと6cmのひし形の面積は？",h:"ひし形 = 対角線 × 対角線 ÷ 2",a:"24 cm²",fig:'<svg width="180" height="160" viewBox="0 0 180 160"><polygon points="90,10 160,80 90,150 20,80" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/><line x1="90" y1="10" x2="90" y2="150" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,4"/><line x1="20" y1="80" x2="160" y2="80" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4"/><text x="92" y="85" font-size="11" fill="#dc2626" font-weight="bold">8cm</text><text x="50" y="75" font-size="11" fill="#2563eb" font-weight="bold">6cm</text></svg>',ex:"ひし形の面積 = 対角線 × 対角線 ÷ 2\n= 8 × 6 ÷ 2 = 24 cm²\n\n【なぜ？】ひし形を囲む長方形（8cm×6cm）の面積のちょうど半分。"},
// ========== 図形：円とおうぎ形 ==========
{id:"g14",g:5,cat:"図形",q:"半径4cmの円の円周の長さは？（円周率=3.14）",h:"円周 = 直径 × 円周率",a:"25.12 cm",fig:'<svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="60" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><line x1="80" y1="80" x2="140" y2="80" stroke="#dc2626" stroke-width="2"/><circle cx="80" cy="80" r="3" fill="#dc2626"/><text x="100" y="75" font-size="12" fill="#dc2626" font-weight="bold">4cm</text></svg>',ex:"円周 = 直径 × π = 2 × 半径 × π\n= 2 × 4 × 3.14 = 25.12 cm\n\n【公式まとめ】\n円周 = 直径 × 3.14\n面積 = 半径 × 半径 × 3.14"},
{id:"g15",g:5,cat:"図形",q:"半径6cmの円の面積は？（円周率=3.14）",h:"面積 = 半径 × 半径 × 3.14",a:"113.04 cm²",fig:'<svg width="170" height="170" viewBox="0 0 170 170"><circle cx="85" cy="85" r="65" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><line x1="85" y1="85" x2="150" y2="85" stroke="#dc2626" stroke-width="2"/><circle cx="85" cy="85" r="3" fill="#dc2626"/><text x="105" y="80" font-size="12" fill="#dc2626" font-weight="bold">6cm</text></svg>',ex:"円の面積 = 半径 × 半径 × π\n= 6 × 6 × 3.14 = 113.04 cm²\n\n【計算のコツ】\n6 × 6 = 36\n36 × 3.14 = 36 × 3 + 36 × 0.14\n= 108 + 5.04 = 113.04"},
{id:"g16",g:5,cat:"図形",q:"半径8cm、中心角90°のおうぎ形の面積は？（円周率=3.14）",h:"おうぎ形 = 円の面積 × 中心角/360",a:"50.24 cm²",fig:'<svg width="180" height="180" viewBox="0 0 180 180"><path d="M 30 150 L 30 30 A 120 120 0 0 1 150 150 Z" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/><line x1="30" y1="150" x2="30" y2="30" stroke="#dc2626" stroke-width="2"/><text x="10" y="95" font-size="12" fill="#dc2626" font-weight="bold">8cm</text><text x="45" y="140" font-size="12" fill="#d97706" font-weight="bold">90°</text></svg>',ex:"おうぎ形の面積 = 円の面積 × 中心角/360\n= 8 × 8 × 3.14 × 90/360\n= 200.96 × 1/4\n= 50.24 cm²\n\n90° = 円の 1/4（90÷360 = 1/4）\n\n【おうぎ形は円のピザカット！】\n中心角が360°なら円全体、180°なら半分。"},
{id:"g17",g:5,cat:"図形",q:"半径10cm、中心角36°のおうぎ形の弧の長さは？（円周率=3.14）",h:"弧の長さ = 円周 × 中心角/360",a:"6.28 cm",fig:'<svg width="200" height="160" viewBox="0 0 200 160"><path d="M 40 140 L 40 40 A 100 100 0 0 1 78 42" fill="#dcfce7" stroke="#059669" stroke-width="2.5"/><line x1="40" y1="140" x2="78" y2="42" stroke="#059669" stroke-width="2.5"/><text x="10" y="95" font-size="12" fill="#dc2626" font-weight="bold">10cm</text><text x="55" y="128" font-size="12" fill="#d97706" font-weight="bold">36°</text></svg>',ex:"弧の長さ = 円周 × 中心角/360\n= 2 × 10 × 3.14 × 36/360\n= 62.8 × 1/10\n= 6.28 cm\n\n36° = 360° の 1/10"},
// ========== 図形：複合図形 ==========
{id:"g18",g:5,cat:"図形",q:"1辺10cmの正方形の中に円がぴったり入っています。色のついた部分（正方形−円）の面積は？（π=3.14）",h:"正方形の面積 − 円の面積。円の直径=正方形の1辺。",a:"21.5 cm²",fig:'<svg width="170" height="170" viewBox="0 0 170 170"><rect x="10" y="10" width="150" height="150" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><circle cx="85" cy="85" r="75" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="75" y="170" font-size="12" fill="#1e293b" font-weight="bold">10cm</text></svg>',ex:"正方形の面積 = 10 × 10 = 100 cm²\n円の半径 = 10 ÷ 2 = 5 cm\n円の面積 = 5 × 5 × 3.14 = 78.5 cm²\n\n色のついた部分 = 100 − 78.5 = 21.5 cm²\n\n【複合図形のコツ】\n大きい図形 − 小さい図形 = 残った部分"},
{id:"g19",g:5,cat:"図形",q:"下の図はL字型の図形です。面積を求めなさい。\nたて全体10cm、横全体8cm。\n切り欠き部分はたて4cm、横5cm。",h:"大きい長方形 − 切り欠きの長方形",a:"60 cm²",fig:'<svg width="200" height="180" viewBox="0 0 200 180"><path d="M20,10 L160,10 L160,90 L100,90 L100,170 L20,170 Z" fill="#dcfce7" stroke="#059669" stroke-width="2.5"/><text x="80" y="8" font-size="11" fill="#1e293b" font-weight="bold">8cm</text><text x="162" y="55" font-size="11" fill="#1e293b" font-weight="bold">4cm</text><text x="5" y="95" font-size="11" fill="#1e293b" font-weight="bold">10cm</text><text x="115" y="85" font-size="11" fill="#dc2626" font-weight="bold">5cm</text><line x1="100" y1="90" x2="160" y2="90" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/></svg>',ex:"方法①：大きい長方形 − 切り欠き\n8 × 10 − 5 × (10−4) = 80 − 30 = 不正解…\n\n正しくは：\n8 × 10 = 80（全体）\n切り欠き = 5 × 4 = 20\nL字 = 80 − 20 = 60 cm²\n\n方法②：2つの長方形に分ける\n上 = 8 × 4 = 32\n下 = (8−5) × (10−4) = 3 × (10-4)…\n→ 下 = 3 × 6 = 18 → 合わない\n\n正確に分けると:\n上の長方形 = 8 × 4 = 32\n下の長方形 = (8-5) × (10-4) = 3 × 6 = 18\nあれ？32+18=50？\n\n【注意】図の寸法を正確に読み取ろう。\n方法① が確実：全体80 − 切り欠き(5×4)=20 → 60 cm²"},
// ========== 図形：体積と表面積 ==========
{id:"g20",g:5,cat:"図形",q:"たて3cm、横5cm、高さ4cmの直方体の体積は？",h:"体積 = たて × 横 × 高さ",a:"60 cm³",fig:'<svg width="200" height="160" viewBox="0 0 200 160"><polygon points="40,60 140,60 140,140 40,140" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><polygon points="40,60 80,30 180,30 140,60" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><polygon points="140,60 180,30 180,110 140,140" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/><text x="75" y="155" font-size="12" fill="#1e293b" font-weight="bold">5cm</text><text x="145" y="105" font-size="12" fill="#1e293b" font-weight="bold">4cm</text><text x="100" y="25" font-size="12" fill="#1e293b" font-weight="bold">3cm</text></svg>',ex:"直方体の体積 = たて × 横 × 高さ\n= 3 × 5 × 4 = 60 cm³\n\n【単位】体積は cm³（立方センチメートル）\n1L = 1000 cm³ も覚えよう。"},
{id:"g21",g:5,cat:"図形",q:"1辺が5cmの立方体の体積と表面積を求めなさい。",h:"立方体は6つの同じ正方形でできている。",a:"体積: 125 cm³、表面積: 150 cm²",fig:'<svg width="160" height="160" viewBox="0 0 160 160"><polygon points="30,60 100,60 100,140 30,140" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><polygon points="30,60 60,30 130,30 100,60" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><polygon points="100,60 130,30 130,110 100,140" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/><text x="55" y="155" font-size="12" fill="#1e293b" font-weight="bold">5cm</text></svg>',ex:"【体積】\n5 × 5 × 5 = 125 cm³\n\n【表面積】\n1つの面 = 5 × 5 = 25 cm²\n6つの面 → 25 × 6 = 150 cm²\n\n表面積 = すべての面の面積の合計\n直方体なら 2×(たて×横 + たて×高さ + 横×高さ)"},
{id:"g22",g:5,cat:"図形",q:"底面が半径3cmの円、高さ10cmの円柱の体積は？（π=3.14）",h:"円柱 = 底面積 × 高さ",a:"282.6 cm³",fig:'<svg width="160" height="180" viewBox="0 0 160 180"><ellipse cx="80" cy="30" rx="55" ry="18" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><rect x="25" y="30" width="110" height="120" fill="#dbeafe" stroke="none"/><line x1="25" y1="30" x2="25" y2="150" stroke="#2563eb" stroke-width="2"/><line x1="135" y1="30" x2="135" y2="150" stroke="#2563eb" stroke-width="2"/><ellipse cx="80" cy="150" rx="55" ry="18" fill="none" stroke="#2563eb" stroke-width="2"/><line x1="80" y1="30" x2="135" y2="30" stroke="#dc2626" stroke-width="2"/><text x="95" y="25" font-size="11" fill="#dc2626" font-weight="bold">3cm</text><text x="138" y="95" font-size="11" fill="#1e293b" font-weight="bold">10cm</text></svg>',ex:"円柱の体積 = 底面積 × 高さ\n底面積 = π × r² = 3.14 × 3 × 3 = 28.26 cm²\n体積 = 28.26 × 10 = 282.6 cm³\n\n【円柱は「円を積み重ねた形」】\n底面積 × 高さ で求められる。"},
// ========== 図形：直方体の表面積 ==========
{id:"g23",g:5,cat:"図形",q:"たて3cm、横4cm、高さ5cmの直方体の表面積は？",h:"3種類の長方形が2面ずつ。",a:"94 cm²",ex:"3種類の面：\n① たて×横 = 3×4 = 12 cm²\n② たて×高さ = 3×5 = 15 cm²\n③ 横×高さ = 4×5 = 20 cm²\n\n各2面ずつ：(12+15+20) × 2 = 47 × 2 = 94 cm²\n\n直方体の表面積 = 2(ab + bc + ca)"},
// ========== 図形：相似と比 ==========
{id:"g24",g:5,cat:"図形",q:"2つの三角形が相似で、辺の比が2:3です。小さい方の底辺が6cmのとき、大きい方の底辺は？",h:"相似な図形は辺の比がすべて等しい。",a:"9 cm",fig:'<svg width="280" height="130" viewBox="0 0 280 130"><polygon points="20,110 100,110 60,30" fill="#dcfce7" stroke="#059669" stroke-width="2"/><polygon points="140,110 260,110 200,10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="45" y="125" font-size="12" fill="#059669" font-weight="bold">6cm</text><text x="185" y="125" font-size="12" fill="#2563eb" font-weight="bold">?cm</text><text x="110" y="70" font-size="14" fill="#64748b" font-weight="bold">∽</text></svg>',ex:"相似比 = 2 : 3\n小さい底辺 : 大きい底辺 = 2 : 3\n6 : □ = 2 : 3\n□ = 6 × 3 ÷ 2 = 9 cm\n\n【相似な図形の性質】\n・対応する辺の比はすべて等しい\n・対応する角は等しい"},
{id:"g25",g:5,cat:"図形",q:"相似な2つの正方形の辺の比が1:3です。面積の比は？",h:"面積は辺の比の2乗になる。",a:"1 : 9",fig:'<svg width="250" height="140" viewBox="0 0 250 140"><rect x="20" y="80" width="40" height="40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><rect x="100" y="20" width="120" height="120" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="30" y="135" font-size="11" fill="#1e293b" font-weight="bold">1</text><text x="150" y="155" font-size="11" fill="#1e293b" font-weight="bold">3</text></svg>',ex:"辺の比 = 1 : 3\n面積の比 = 1² : 3² = 1 : 9\n\n【超重要公式】\n相似比が a : b のとき\n→ 面積比 = a² : b²\n→ 体積比 = a³ : b³\n\n例：辺が2倍 → 面積は4倍、体積は8倍"},
// ========== 図形：実践問題 ==========
{id:"g26",g:5,cat:"図形",q:"五角形の内角の和は何度？",h:"三角形に分けて考える。n角形 = (n−2) × 180°",a:"540°",fig:'<svg width="180" height="170" viewBox="0 0 180 170"><polygon points="90,10 170,65 145,155 35,155 10,65" fill="none" stroke="#2563eb" stroke-width="2.5"/><line x1="90" y1="10" x2="35" y2="155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4"/><line x1="90" y1="10" x2="145" y2="155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4"/></svg>',ex:"n角形の内角の和 = (n−2) × 180°\n五角形 → (5−2) × 180° = 3 × 180° = 540°\n\n対角線で3つの三角形に分けられるから。\n三角形=180°、四角形=360°、五角形=540°、六角形=720°"},
{id:"g27",g:5,cat:"図形",q:"底辺12cm、高さ8cmの平行四辺形の中に、底辺12cm、高さ8cmの三角形があります。三角形の面積は平行四辺形の何分の何？",h:"同じ底辺と高さの三角形と平行四辺形を比べよう。",a:"1/2（半分）",ex:"平行四辺形の面積 = 12 × 8 = 96 cm²\n三角形の面積 = 12 × 8 ÷ 2 = 48 cm²\n48 ÷ 96 = 1/2\n\n【大事な関係】\n同じ底辺と高さなら、\n三角形 = 平行四辺形の半分\nこれはいつでも成り立つ！"},
{id:"g28",g:5,cat:"図形",q:"半径6cmの半円の面積と周りの長さを求めなさい。（π=3.14）",h:"半円 = 円の半分。周りの長さは弧+直径。",a:"面積: 56.52 cm²、周りの長さ: 30.84 cm",fig:'<svg width="200" height="120" viewBox="0 0 200 120"><path d="M 20 100 A 80 80 0 0 1 180 100" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/><line x1="20" y1="100" x2="180" y2="100" stroke="#2563eb" stroke-width="2.5"/><line x1="100" y1="100" x2="180" y2="100" stroke="#dc2626" stroke-width="2"/><text x="130" y="95" font-size="12" fill="#dc2626" font-weight="bold">6cm</text></svg>',ex:"【面積】\n円の面積 = 6 × 6 × 3.14 = 113.04\n半円 = 113.04 ÷ 2 = 56.52 cm²\n\n【周りの長さ】\n弧（曲線部分）= 円周の半分\n= 2 × 6 × 3.14 ÷ 2 = 18.84 cm\n直径 = 6 × 2 = 12 cm\n周りの長さ = 18.84 + 12 = 30.84 cm\n\n【よくある間違い】周りに直径を足し忘れる！"},
{id:"g29",g:5,cat:"図形",q:"時計の長針と短針が3時のとき、2つの針がつくる角度は？",h:"時計の1時間分は何度？",a:"90°",ex:"時計は1周 = 360°\n12時間で360° → 1時間 = 30°\n3時 → 短針は3の位置\n12から3まで = 3時間分 = 30° × 3 = 90°\n\n【時計の角度のコツ】\n1時間 = 30°（360÷12）\n1分 = 短針は0.5°動く\n長針は1分で6°（360÷60）動く"},
{id:"g30",g:5,cat:"図形",q:"時計の長針と短針が4時のとき、2つの針がつくる小さい方の角度は？",h:"1時間分 = 30°",a:"120°",ex:"4時 → 短針は4の位置\n12から4まで = 4時間分 = 30° × 4 = 120°\n\n反対側は 360° − 120° = 240°\n小さい方は 120°"},
],

// 4年
{id:"j01",g:4,cat:"漢字の読み",q:"読みをひらがなで。\n① 努力 ② 勇気 ③ 季節 ④ 伝説 ⑤ 特別",h:"4年生の漢字。",a:"① どりょく ② ゆうき ③ きせつ ④ でんせつ ⑤ とくべつ",ex:"① がんばること。② 恐れず立ち向かう心。③ 春夏秋冬。④ 語り伝えられた話。⑤ ふつうと違う。"},
{id:"j02",g:4,cat:"漢字の書き取り",q:"漢字に直せ。\n① 花がサく ② 手紙をオクる ③ ジッケン ④ レキシ ⑤ カンガえる",h:"4年生までの漢字。",a:"① 咲 ② 送 ③ 実験 ④ 歴史 ⑤ 考",ex:"① 花がひらく。② 届ける。③ ためす。④ 過去の記録。⑤ 筋道を立てる。"},
{id:"j03",g:4,cat:"ことわざ",q:"「急がば回れ」の意味は？\nア 急ぐなら走れ\nイ 急ぐほど安全な道を選べ\nウ 回り道をして遊べ",h:"「回れ」=回り道をしろ",a:"イ",ex:"急ぐときほど確実な方法をとるべき、という教え。"},
{id:"j04",g:4,cat:"主語・述語",q:"主語と述語を抜き出せ。\n① 赤い花が美しく咲いている。\n② 弟は毎朝ジョギングをする。",h:"「何が」→主語、文末→述語",a:"① 花が / 咲いている\n② 弟は / する",ex:"「赤い」「美しく」「毎朝」「ジョギングを」は修飾語。骨格を見抜こう。"},
{id:"j05",g:4,cat:"つなぎ言葉",q:"（ ）に入るつなぎ言葉は？\n「雨が降った。（ ）運動会は中止に。」\nア しかし イ だから ウ また エ つまり",h:"原因→結果の関係。",a:"イ（だから）",ex:"順接（だから）=原因→結果。逆接（しかし）=反対。並列（また）=つけ加え。"},
{id:"j06",g:4,cat:"語句",q:"「頭が上がらない」の意味は？\nア 背が伸びない\nイ 相手に対等に振る舞えない\nウ 頭が痛い",h:"人に対して使う表現。",a:"イ",ex:"弱みや恩があり、対等に振る舞えないこと。慣用句は体の部位を使うものが多い。"},
{id:"j07",g:4,cat:"四字熟語",q:"「十人十色」の意味は？\nア 10色見える\nイ 人それぞれ違う\nウ 10人で1人分",h:"10人が10通りということは？",a:"イ",ex:"十人十色 = 人はそれぞれ好みや考えが異なる。"},
// 5年
{id:"j10",g:5,cat:"漢字の読み",q:"読みをひらがなで。\n① 拝啓 ② 遭遇 ③ 穏やか ④ 賛否 ⑤ 慎重",h:"中学受験頻出。",a:"① はいけい ② そうぐう ③ おだやか ④ さんぴ ⑤ しんちょう",ex:"① 手紙の書き出し。② 思いがけず出会う。③ 静かで落ち着いた。④ 賛成と反対。⑤ 注意深い。"},
{id:"j11",g:5,cat:"漢字の書き取り",q:"漢字に直せ。\n① シンライ ② チョウジョウ ③ セイジツ ④ ジュンシュ ⑤ シュチョウ",h:"入試頻出の漢字。",a:"① 信頼 ② 頂上 ③ 誠実 ④ 遵守 ⑤ 主張",ex:"① 信じてたよる。② 一番高い所。③ まじめで正直。④ きまりを守る。⑤ 考えを強く言う。"},
{id:"j12",g:5,cat:"ことわざ",q:"（ ）を埋めよ。\n① 石の上にも（ ）年\n② 猿も（ ）から落ちる\n③（ ）に小判",h:"動物が多い！",a:"① 三 ② 木 ③ 猫",ex:"① 辛抱すれば成果。② 達人でも失敗。③ 価値がわからない者に高価なものは無意味。"},
{id:"j13",g:5,cat:"敬語",q:"尊敬語にせよ。\n① 先生が来た\n② 先生が言った\n③ 先生が食べた",h:"特別な形の動詞。",a:"① いらっしゃった\n② おっしゃった\n③ 召し上がった",ex:"来る→いらっしゃる、言う→おっしゃる、食べる→召し上がる\n見る→ご覧になる、する→なさる も覚えよう。"},
{id:"j14",g:5,cat:"四字熟語",q:"（ ）を埋めよ。\n① 一石（ ）鳥 ② 以心（ ）心 ③ 七転八（ ） ④ 一期一（ ）",h:"意味を考えよう。",a:"① 二 ② 伝 ③ 起 ④ 会",ex:"①1つで2つの利益。②言葉なしで通じる。③何度でも立ち上がる。④一度の出会いを大切に。"},
{id:"j15",g:5,cat:"語句",q:"「途方に暮れる」= ？\nア 日が暮れる\nイ どうしていいかわからなくなる\nウ 迷子になる",h:"途方=方法。",a:"イ",ex:"方法が見つからず困りはてる。字面に引っ張られないように！"},
{id:"j16",g:5,cat:"文法",q:"品詞名を答えよ。\n①「とても」きれいな花\n②「走る」ことが好き\n③「この」本\n④ 空が「青い」",h:"名詞/動詞/形容詞/副詞/連体詞のどれ？",a:"① 副詞 ② 動詞 ③ 連体詞 ④ 形容詞",ex:"副詞→用言を修飾。連体詞→名詞を修飾(活用なし)。形容詞→「〜い」で終わる。"},
{id:"j17",g:5,cat:"対義語",q:"対義語を書け。\n① 原因↔（ ） ② 賛成↔（ ） ③ 増加↔（ ） ④ 簡単↔（ ）",h:"漢字1字ずつ考えよう。",a:"① 結果 ② 反対 ③ 減少 ④ 困難",ex:"増↔減、加↔少のように漢字の意味で対を考える。"},
// ★ 読解・記述 ★
{id:"j20",g:5,cat:"読解（論説）",q:"次の文を読んで問いに答えよ。\n\n「本を読むということは、ただ文字を目で追うことではない。書かれた言葉の向こう側にある、書いた人の気持ちや考えを想像することである。だからこそ、同じ本を読んでも、人によって感じ方が違うのだ。」\n\n問：筆者が「本を読む」ことで最も大切だと考えていることを30字以内で書け。",h:"「ではない。〜ことである」の構造に注目。",a:"書いた人の気持ちや考えを想像すること。",ex:"否定→肯定の対比構造。筆者の主張は肯定側にある。\n答えは本文の言葉を使って書くのが基本。\n\n【記述のコツ】\n①本文から根拠を探す\n②「〜こと。」で終わるようにまとめる\n③字数制限を守る"},
{id:"j21",g:5,cat:"読解（物語）",q:"次の文を読んで問いに答えよ。\n\n「健太は教室の窓から、雨の中を走っていく友人の背中を黙って見つめていた。さっき自分が言った一言が、まるで石のように胸の中に沈んでいく。『待ってくれ』——そう言いたいのに、声はのどの奥でつまったまま動かなかった。」\n\n問：この時の健太の気持ちを40字以内で書け。",h:"「石のように胸に沈む」「声がつまる」からどんな気持ち？",a:"（例）自分の言葉で友人を傷つけてしまったことを後悔し、謝りたいが声が出せないもどかしさ。",ex:"心情読解のポイント：\n①比喩表現に注目（「石のように沈む」→重い後悔）\n②行動に注目（「黙って見つめる」→声が出せない）\n③「言いたいのに」→もどかしさ、悔しさ\n\n【入試の心情問題のコツ】\n・「うれしい」「悲しい」だけでなく、なぜそう感じたかの理由も書く\n・本文の表現を根拠にして答える"},
{id:"j22",g:5,cat:"読解（論説）",q:"次の文を読んで問いに答えよ。\n\n「最近、子どもたちの外遊びの時間が減っている。ある調査では、30年前と比べて平日の外遊び時間が半分以下になったという。その原因として、テレビゲームの普及や塾通いの増加が挙げられる。しかし、外遊びには体力づくりだけでなく、友だちとの関わりを通じてコミュニケーション能力を育てるという大切な役割がある。」\n\n問：筆者は外遊びにどのような役割があると考えていますか。本文から2つ答えなさい。",h:"最後の文に注目。「だけでなく」の前後が2つの役割。",a:"① 体力づくり\n② コミュニケーション能力を育てる",ex:"「Aだけでなく、Bも」→ A と B の2つが答え。\n①体力づくり\n②友だちとの関わりでコミュニケーション能力を育てる\n\n【ポイント】「だけでなく」「のみならず」は2つ以上の要素を並べる表現。入試ではこの構造から複数の答えを求める問題がよく出る。"},
{id:"j23",g:5,cat:"読解（物語）",q:"次の文を読んで問いに答えよ。\n\n「『あきらめるな。あきらめたらそこで終わりだ。』\n監督の言葉を思い出しながら、美咲は震える足でもう一度走り出した。ゴールまであと200メートル。沿道の声援が、少しずつ大きくなっていく。目の前がにじんで見えた。」\n\n問：「目の前がにじんで見えた」のはなぜか。美咲の気持ちを含めて30字以内で書け。",h:"マラソンで「目がにじむ」のは何のせい？体の状態と気持ちの両方を考えよう。",a:"（例）苦しさに耐えながら懸命に走り、涙があふれたから。",ex:"「にじんで見える」= 涙（感動、苦しさ、悔しさなど）\n美咲の状況：震える足＋監督の言葉＋声援→苦しいけれど諦めない\n\n感情は「苦しさ＋頑張りたい気持ち＋感動」が混じっている。\n\n【入試のポイント】\n比喩的表現の理由を問う問題では：\n①直前・直後の描写をヒントにする\n②登場人物の状況を整理する\n③「なぜそうなったか」を因果関係で書く"},

{id:"j30",g:5,cat:"漢字の読み",q:"「協力」を読みなさい。",h:"きょう～",a:"きょうりょく",ex:"複数の人が力を合わせることを意味します。中学受験頻出の漢字です。"},
{id:"j31",g:5,cat:"漢字の読み",q:"「提案」を読みなさい。",h:"てい～",a:"ていあん",ex:"意見やアイデアを提示することです。"},
{id:"j32",g:5,cat:"漢字の読み",q:"「採用」を読みなさい。",h:"さい～",a:"さいよう",ex:"良いものを選んで使うことです。"},
{id:"j33",g:5,cat:"漢字の書き取り",q:"『きょうか書』の下線部を漢字で書きなさい。",h:"教～",a:"教科",ex:"学校で教える各教科の『教科』です。"},
{id:"j34",g:5,cat:"漢字の書き取り",q:"『いすうがふえた』の下線部を漢字で書きなさい。",h:"椅子の『い』",a:"椅子",ex:"座るための家具です。"},
{id:"j35",g:5,cat:"漢字の書き取り",q:"『せいかつをする』の下線部を漢字で書きなさい。",h:"生きる～",a:"生活",ex:"日常的に生きていくことです。"},
// ★ 5年前半：慣用句・ことわざ・四字熟語 ★
{id:"j36",g:5,cat:"慣用句",q:"「あの選手は足が速いので、相手チームも『手が出ない』」の『手が出ない』の意味は？（ア 手を上げない イ 対抗できない ウ 手を使わない エ 近づけない）",h:"競争で～",a:"イ",ex:"『手が出ない』は『かなわない、対抗できない』という意味の慣用句です。"},
{id:"j37",g:5,cat:"慣用句",q:"「兄は運動が得意だから『頭一つ抜ける』」この表現の意味は？（ア 背が高い イ 少し優れている ウ 大きく優れている エ 体が大きい）",h:"～ぬきんでる",a:"ウ",ex:"『頭一つ抜ける』は『群を抜いて優れている』という意味です。"},
{id:"j38",g:5,cat:"慣用句",q:"「この問題は『歯が立たない』」の意味は？（ア 歯磨きができない イ 理解できない ウ 簡単である エ 非常に難しい）",h:"難しくて～",a:"エ",ex:"『歯が立たない』は『かなわない、非常に難しい』という意味。"},
{id:"j39",g:5,cat:"慣用句",q:"「彼の説明は『目を通す』ことができた」この『目を通す』の意味は？（ア よく見える イ 目玉焼きを作る ウ ざっと読む・見る エ 眼科で検査する）",h:"読んで～",a:"ウ",ex:"『目を通す』は『ざっと読む、簡単に見る』という意味。"},
{id:"j40",g:5,cat:"ことわざ",q:"「『石の上にも三年』とはどういう意味か？」（ア 努力を続ければ成功する イ 石の上は冷たい ウ 三年我慢すればよい エ 石は硬い）",h:"がまん～",a:"ア",ex:"つらくても努力を続ければ、やがて成功するという意味。"},
{id:"j41",g:5,cat:"ことわざ",q:"「『備えあれば憂いなし』とはどういう意味か？」（ア 悩みがない イ 準備をしておけば心配がない ウ 心配することは悪い エ 準備は無駄である）",h:"じゅんび～",a:"イ",ex:"あらかじめ準備をしておけば、いざという時に困らないという教訓。"},
{id:"j42",g:5,cat:"ことわざ",q:"「『蛙の子は蛙』とはどういう意味か？」（ア 蛙は同じ種類である イ 親に似た子どもが生まれる ウ 子どもは親のようにならない エ 蛙はよく跳ぶ）",h:"おや～こ～",a:"イ",ex:"子どもは親に似て、親と同じようになるという意味。"},
{id:"j43",g:5,cat:"四字熟語",q:"「『一生懸命』とはどういう意味か？」（ア 一度だけ頑張る イ 全力で物事に取り組む ウ 一人で努力する エ 生涯で一番大事なこと）",h:"ぜんりょく～",a:"イ",ex:"全力を尽くして、真剣に物事に取り組むという意味。"},
{id:"j44",g:5,cat:"四字熟語",q:"「『千差万別』とはどういう意味か？」（ア 千と万の違い イ 様々に異なる ウ 数が多い エ 千個と万個が混ざっている）",h:"いろいろ～",a:"イ",ex:"人や物によって様々に異なるという意味。"},
{id:"j45",g:5,cat:"四字熟語",q:"「『自画自賛』とはどういう意味か？」（ア 自分で絵を描く イ 自分で自分をほめる ウ 自分を反省する エ 自分の絵が上手）",h:"自分を～",a:"イ",ex:"自分で自分のことをほめること。"},
// ★ 5年前半：類義語・対義語・敬語 ★
{id:"j46",g:5,cat:"類義語・対義語",q:"「『優秀』の対義語はどれか？」（ア 成績がいい イ 劣悪 ウ 立派 エ 賢い）",h:"反対の意味～",a:"イ",ex:"『優秀』の反対は『劣悪（れつあく）』。"},
{id:"j47",g:5,cat:"類義語・対義語",q:"「『開始』の類義語はどれか？」（ア 終わる イ 始まる ウ スタート エ ア、イ両方）",h:"始まる～",a:"イ",ex:"『開始』と『始まる』は類義語。"},
{id:"j48",g:5,cat:"類義語・対義語",q:"「『豊か』の対義語はどれか？」（ア 裕福 イ 貧しい ウ 充実 エ 希少）",h:"不足～",a:"イ",ex:"『豊か』の反対は『貧しい』。"},
{id:"j49",g:5,cat:"敬語",q:"「先生のおっしゃることは正しい」の敬語の種類は？（ア 尊敬語 イ 謙譲語 ウ 丁寧語）",h:"先生に対して～",a:"ア",ex:"『おっしゃる』は『言う』の尊敬語。相手の行動を敬う表現。"},
{id:"j50",g:5,cat:"敬語",q:"「父が申し上げました」の敬語の種類は？（ア 尊敬語 イ 謙譲語 ウ 丁寧語）",h:"自分の家族について～",a:"イ",ex:"『申し上げる』は『言う』の謙譲語。自分側をへりくだって表現。"},
{id:"j51",g:5,cat:"敬語",q:"正しい敬語はどちら？\nア：先生、本を読まれていますね。\nイ：先生、本をお読みになっていますね。",h:"正しい表現～",a:"イ",ex:"『お読みになっている』が正しい尊敬語の表現。"},
// ★ 5年前半：文法・読解・語句 ★
{id:"j52",g:5,cat:"文法",q:"「赤い花が咲く」の「赤い」は何？（ア 主語 イ 修飾語 ウ 述語 エ 目的語）",h:"何を修飾～",a:"イ",ex:"『赤い』は『花』を修飾する形容詞（修飾語）。"},
{id:"j53",g:5,cat:"文法",q:"「毎日、学校に行く」の「毎日」は何？（ア 主語 イ 修飾語 ウ 述語 エ 目的語）",h:"どのように～",a:"イ",ex:"『毎日』は『行く』を修飾する副詞的な修飾語。"},
{id:"j54",g:5,cat:"文法",q:"「太郎が本を読む」の「本を」は何？（ア 主語 イ 修飾語 ウ 述語 エ 目的語）",h:"何を～",a:"エ",ex:"『本を』は『読む』の目的語。"},
{id:"j55",g:5,cat:"読解（物語）",q:"『太郎は毎日公園で遊んでいた。ある日、太郎は公園で迷子の女の子を見つけた。太郎はすぐに女の子を助けようと思った。』太郎はなぜ助けようと思った？（ア 友達だから イ 困っていたから ウ ルールだから エ 泣いていたから）",h:"本文から～",a:"イ",ex:"迷子は困っている状態。太郎は困っている子を助けようとした。"},
{id:"j56",g:5,cat:"読解（物語）",q:"『花子は朝、いつも6時に起きていた。でも最近、花子は7時まで寝てしまう。』花子について何がわかるか？（ア 怠けている イ 最近何か変わった ウ 朝が苦手 エ 遅刻している）",h:"最近の変化～",a:"イ",ex:"以前と最近で起床時間が変わっているので、何か変化があったと推測できる。"},
{id:"j57",g:5,cat:"読解（論説）",q:"『地球の温度が上がることを温暖化という。温暖化により、氷が溶けて海の水が増える。』この現象を何という？（ア 地震 イ 洪水 ウ 海面上昇 エ 台風）",h:"海の水が～",a:"ウ",ex:"氷が溶けて海の水が増え陸地に押し寄せる現象は『海面上昇』。"},
{id:"j58",g:5,cat:"読解（論説）",q:"『リサイクルは資源を無駄にしない方法です。古い紙や瓶は新しい製品に生まれ変わります。』リサイクルの主な理由は？（ア 習慣 イ 環境を守り資源を大切にするため ウ 楽しい エ 法律）",h:"環境～資源～",a:"イ",ex:"限られた資源を大切に使い、環境を守ることが目的。"},
{id:"j59",g:5,cat:"語句",q:"「きしゃ」という言葉は同音異義語です。いくつの意味がある？（ア 1つ イ 2つ ウ 3つ以上）",h:"同音異義語～",a:"ウ",ex:"『記者（新聞の）』『汽車（乗り物）』『帰社（会社に帰る）』など複数の意味。"},
{id:"j60",g:5,cat:"語句",q:"「飛行機」と「航空機」は？（ア 同じ意味 イ 違う意味 ウ 関連があるが異なる）",h:"似た言葉～",a:"ア",ex:"どちらも空を飛ぶ乗り物を指す。ほぼ同じ意味の類義語。"},

// Vocabulary
{id:"e01",g:5,cat:"Vocabulary",q:"Choose the best word.\n\n\"The scientist made a groundbreaking (     ) that changed our understanding of the universe.\"\n\n(A) discovery (B) recovery (C) delivery (D) coverage",h:"Scientists find something new = ?",a:"(A) discovery",ex:"discovery = 発見。groundbreaking = 画期的な\n(B) recovery=回復 (C) delivery=配達 (D) coverage=報道\n\n【準1級】groundbreaking は頻出形容詞。類: revolutionary, innovative"},
{id:"e02",g:5,cat:"Vocabulary",q:"\"Despite the heavy rain, the runners showed great (     ) and finished the race.\"\n\n(A) patience (B) perseverance (C) preference (D) performance",h:"They kept going through tough conditions.",a:"(B) perseverance",ex:"perseverance = 忍耐力、粘り強さ\n(A) patience=忍耐(待つ力) (C) preference=好み (D) performance=成果\n\npersevere(動詞)の名詞形。準1級長文頻出。"},
{id:"e03",g:5,cat:"Vocabulary",q:"\"The new policy has had a significant (     ) on the local economy.\"\n\n(A) impact (B) import (C) impulse (D) imprint",h:"= effect",a:"(A) impact",ex:"have an impact on ~ = ～に影響を与える。準1級超頻出コロケーション。"},
{id:"e04",g:5,cat:"Vocabulary",q:"\"The company decided to (     ) its operations to Southeast Asia.\"\n\n(A) relocate (B) renovate (C) regulate (D) reinforce",h:"They moved their business.",a:"(A) relocate",ex:"relocate=移転する(re+locate)。(B)renovate=改装 (C)regulate=規制 (D)reinforce=強化\n\n接頭辞 re-=「再び」で意味を推測しよう。"},
{id:"e05",g:5,cat:"Vocabulary",q:"\"The charity is dedicated to (     ) poverty in developing countries.\"\n\n(A) eliminating (B) illustrating (C) accelerating (D) accommodating",h:"The charity wants to END poverty.",a:"(A) eliminating",ex:"eliminate = 根絶する。be dedicated to + -ing = ～に専念する。"},
{id:"e06",g:5,cat:"Vocabulary",q:"\"The athlete's remarkable (     ) from injury surprised everyone.\"\n\n(A) discovery (B) recovery (C) delivery (D) memory",h:"Got better after being hurt.",a:"(B) recovery",ex:"recovery=回復。make a recovery=回復する。野球でもケガからの recovery は大事だね！"},
{id:"e07",g:5,cat:"Vocabulary",q:"\"Parents should (     ) their children to think independently.\"\n\n(A) discourage (B) encourage (C) enforce (D) endure",h:"Positive action to help kids.",a:"(B) encourage",ex:"encourage A to do = Aに～するよう促す。(A) discourage=反意語 (C) enforce=強制 (D) endure=耐える"},
// Reading
{id:"e10",g:5,cat:"Reading",q:"Read the passage.\n\n\"Bees play a crucial role in our ecosystem. They pollinate approximately 75% of flowering plants and about 35% of food crops. Without bees, many fruits and vegetables would become scarce. However, bee populations have been declining rapidly due to pesticide use and habitat loss.\"\n\nWhat is the main concern?\n(A) Bees are dangerous.\n(B) Bee decline threatens food supply.\n(C) We should eat more vegetables.\n(D) Pesticides help farming.",h:"What's the problem described?",a:"(B)",ex:"ハチ減少→食糧供給への脅威。\nKey: crucial=重要, pollinate=受粉, scarce=不足, decline=減少, pesticide=農薬, habitat loss=生息地喪失"},
{id:"e11",g:5,cat:"Reading",q:"Read the passage.\n\n\"AI is transforming how we work and live. While AI offers benefits like automating repetitive tasks and improving medical diagnoses, it also raises concerns about job displacement and privacy. Striking the right balance between innovation and regulation will be a defining challenge.\"\n\nMain point?\n(A) AI should be banned.\n(B) AI has only positive effects.\n(C) Balancing AI benefits and risks is key.\n(D) Regulations prevent innovation.",h:"Both good and bad → what's the conclusion?",a:"(C)",ex:"著者は利点とリスクのバランスが重要と主張。\nKey: tremendous=巨大, automate=自動化, displacement=排除, striking a balance=バランスをとる\n\n極端な選択肢(A)(B)は通常不正解。"},
{id:"e12",g:5,cat:"Reading",q:"Read the passage.\n\n\"The concept of 'digital detox' has gained popularity. Research suggests excessive screen time can lead to sleep disorders, anxiety, and reduced social skills. Many experts recommend setting 'device-free' hours daily.\"\n\nWhat does the passage suggest?\n(A) Stop using phones completely.\n(B) Technology has no negative effects.\n(C) Taking breaks from devices can be beneficial.\n(D) Children need more technology.",h:"What do experts recommend?",a:"(C)",ex:"デジタルデトックスが有益。\nKey: deliberately=意図的に, excessive=過度の, disorder=障害, beneficial=有益\n\n極端な(A)は不正解。suggest/imply問題は穏当な選択肢を選ぶ。"},

{id:"e15",g:5,cat:"Grammar",q:"\"If I (     ) enough money, I would travel around the world.\"\n(A) have (B) had (C) will have (D) having",h:"Hypothetical — not real.",a:"(B) had",ex:"仮定法過去: If + 過去形, would + 原形\n「もしお金があったら旅行するのに」→実際にはない\n\n仮定法は準1級必須！"},
{id:"e16",g:5,cat:"Grammar",q:"\"Not only (     ) the exam, but she also got the highest score.\"\n(A) she passed (B) did she pass (C) she did pass (D) passed she",h:"Not only at the start → what happens?",a:"(B) did she pass",ex:"Not only + 倒置（助動詞+主語）\nNot only did she pass...\n\n否定語句が文頭→倒置。Never have I..., Hardly had S V when... も覚えよう。"},
{id:"e17",g:5,cat:"Grammar",q:"\"(     ) the weather, the outdoor concert was a success.\"\n(A) Despite (B) Although (C) Because of (D) However",h:"Bad weather BUT good concert. Before a noun = ?",a:"(A) Despite",ex:"Despite + 名詞 = ～にもかかわらず\nAlthough + S+V（節）\n\nこの使い分けは準1級頻出！"},

{id:"e30",g:5,cat:"Summary（要約）",q:"Read the passage and write a summary in 2-3 sentences.\n\n\"Urban gardens are becoming increasingly popular in major cities worldwide. These green spaces provide multiple benefits: they supply fresh produce to local communities, reduce the urban heat island effect, and create gathering places that strengthen neighborhood bonds. Studies have shown that residents living near community gardens report lower stress levels and higher life satisfaction compared to those without access to such spaces.\"",h:"What are urban gardens, what benefits do they provide, and what do studies show?",a:"(Example) Urban gardens are growing in popularity in cities around the world. They provide fresh food, lower temperatures, and build community connections. Research also shows that people living near these gardens experience less stress and greater satisfaction with life.",ex:"【要約のコツ（英検準1級新形式）】\n①トピックセンテンス: 何についての文章か\n②主な詳細: 重要なポイントを2-3つ\n③自分の言葉で言い換える（パラフレーズ）\n\n本文: provide multiple benefits → 要約: provide fresh food, lower temperatures, build connections\n本文: lower stress, higher life satisfaction → 要約: less stress, greater satisfaction\n\nそのままコピーせず、言い換えることが大切！"},

{id:"e36",g:5,cat:"Vocabulary（準1級）",q:"Choose the best word.\n\"She tried to ( ) her anger, but her voice was trembling.\"\n(A) suppress (B) suspect (C) surpass (D) supply",h:"怒りを「おさえる」。sup- で始まる。",a:"(A) suppress",ex:"suppress = 抑える、鎮圧する。準1級で超頻出。\nsuspect = 疑う\nsurpass = 超える\nsupply = 供給する"},
{id:"e37",g:5,cat:"Vocabulary（準1級）",q:"Choose the best word.\n\"The scientist made a ( ) discovery that changed our understanding of the universe.\"\n(A) remarkable (B) reluctant (C) relevant (D) reliable",h:"「注目すべき」「驚くべき」という意味の形容詞。",a:"(A) remarkable",ex:"remarkable = 注目すべき、驚くべき。\nreluctant = 気が進まない\nrelevant = 関連のある\nreliable = 信頼できる\nすべて準1級レベルの重要語。"},

{id:"e39",g:5,cat:"Vocabulary（準1級）",q:"Choose the best word.\n\"The city council voted to ( ) the old bridge and build a modern one.\"\n(A) demolish (B) diminish (C) distinguish (D) distribute",h:"古い橋を「取り壊す」。",a:"(A) demolish",ex:"demolish = 取り壊す、解体する。\ndiminish = 減少する\ndistinguish = 区別する\ndistribute = 分配する\n準1級では de-/dis- 接頭辞の動詞が多数出題される。"},

{id:"e40",g:5,cat:"Reading（準1級）",q:"Read and answer.\n\n\"Many people assume that multitasking increases productivity. However, recent research suggests that switching between tasks actually reduces efficiency. The brain needs time to refocus each time it shifts attention, leading to more errors and slower completion times.\"\n\nWhat is the main idea?\n(A) Multitasking is a valuable skill.\n(B) Multitasking may actually hurt performance.\n(C) The brain can handle multiple tasks easily.\n(D) Research supports multitasking.",h:"However以降が筆者の主張。",a:"(B)",ex:"However で主張が転換。switching reduces efficiency が主旨。\n準1級読解では逆接（however, nevertheless, yet）の後に筆者の真の主張がくるパターンが多い。"},
{id:"e41",g:5,cat:"Reading（準1級）",q:"Read and answer.\n\n\"Coral reefs, often called the 'rainforests of the sea,' support approximately 25% of all marine species despite covering less than 1% of the ocean floor. Rising ocean temperatures cause coral bleaching, a phenomenon where corals expel the algae living in their tissues, turning white and often dying.\"\n\nWhat does 'coral bleaching' refer to?\n(A) Corals changing to a healthier color.\n(B) Corals losing their algae and turning white.\n(C) Algae growing too fast on corals.\n(D) Ocean floors becoming whiter.",h:"bleaching は「白くなること」。本文の定義を確認。",a:"(B)",ex:"本文に直接定義: corals expel the algae → turning white。\n準1級読解では専門用語の定義を本文中から読み取る力が必要。"},
{id:"e42",g:5,cat:"Reading（準1級）",q:"Read and answer.\n\n\"The concept of 'food miles' refers to the distance food travels from where it is produced to where it is consumed. Supporters argue that buying local reduces carbon emissions. Critics, however, point out that transportation accounts for only a small fraction of food's total carbon footprint, and that farming methods matter far more.\"\n\nWhat do critics of 'food miles' argue?\n(A) Local food is always better for the environment.\n(B) Transportation is the biggest source of emissions.\n(C) How food is produced matters more than how far it travels.\n(D) Food miles should be displayed on all products.",h:"Critics の主張を探す。however の後。",a:"(C)",ex:"Critics say: farming methods matter far more than transportation distance.\n準1級では賛成派と反対派の意見を正確に読み分ける力が問われる。"},

{id:"e44",g:5,cat:"Grammar（準1級）",q:"Choose the correct answer.\n\"It is essential that every member ( ) the safety regulations.\"\n(A) follows (B) follow (C) will follow (D) followed",h:"It is essential that S + ???（仮定法現在）",a:"(B) follow",ex:"It is essential/important/necessary that S + 原形（仮定法現在）。\nshould が省略された形。→ every member follow（三単現のsなし！）\ndemand/suggest/insist/recommend も同じパターン。準1級で超頻出！"},
